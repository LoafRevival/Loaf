
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loaf Retro Portal</title>
    <style>
        /* AERO STYLE CSS */
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        .window-container {
            width: 800px; background: #f0f0f0; border: 1px solid #777;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-radius: 5px;
        }

        .title-bar {
            background: linear-gradient(#e1e1e1, #c1c1c1); padding: 5px 10px;
            display: flex; justify-content: space-between; border-bottom: 1px solid #999;
        }

        .content-area { padding: 20px; }

        /* Mimicking the User Account Panel structure */
        .account-card {
            border: 1px solid #ccc; background: #fff; padding: 15px;
            display: flex; gap: 15px; align-items: center; margin-top: 10px;
        }

        .profile-img { width: 64px; height: 64px; background: #ddd; border: 1px solid #999; }

        input { padding: 5px; border: 1px solid #999; margin: 5px 0; }
        
        .d-none { display: none !important; }
    </style>
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <span>📁 Облікові записи користувачів</span>
        <span>— ⬜ X</span>
    </div>

    <div class="content-area">
        <h2 id="view-title">Sign In to LoafXD</h2>
        
        <div id="auth-container">
            <form id="login-form">
                <input type="text" id="login-user" placeholder="Screen Name">
                <input type="password" id="login-pass" placeholder="Password">
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div id="dashboard-container" class="d-none">
            <div class="account-card">
                <div class="profile-img"></div>
                <div>
                    <h3 id="display-username"></h3>
                    <p>Administrator</p>
                </div>
            </div>
            <br>
            <input type="text" id="user-badge" placeholder="Badge title...">
            <button id="save-profile">Save Metadata</button>
            <button id="btn-logout">Sign Out</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
