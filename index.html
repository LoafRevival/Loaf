<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #008080; font-family: 'MS Sans Serif', sans-serif; }
        .window { 
            width: 300px; background: #c0c0c0; border: 2px outset #ffffff; 
            padding: 2px; margin: 50px auto; 
        }
        .title-bar { background: #000080; color: white; padding: 3px; font-weight: bold; }
        .content { padding: 15px; }
        input { border: 2px inset #ffffff; margin-bottom: 10px; width: 90%; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">Sign In</div>
    <div class="content" id="login-view">
        <form onsubmit="return false;">
            <input type="text" id="user" placeholder="Screen Name"><br>
            <input type="password" id="pass" placeholder="Password"><br>
            <button id="btn-login">Sign In</button>
            <p style="font-size: 11px; cursor: pointer; color: blue; text-decoration: underline;" 
               onclick="showReg()">Create an account</p>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
