<!DOCTYPE html>
<html lang="en">
<body style="margin:0; height:100vh; background:#8da4ae; font-family:'Segoe UI', Tahoma, sans-serif; display:flex; justify-content:center; align-items:center;">

    <div style="width:800px; height:500px; background:rgba(255,255,255,0.25); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.4); border-radius:8px 8px 0 0; box-shadow:0 10px 30px rgba(0,0,0,0.5); display:flex; flex-direction:column;">
        
        <div style="padding:5px 10px; color:white; display:flex; justify-content:space-between; align-items:center;">
            <span>📁 Loaf: Time machine for messengers.</span>
            <div>
                <button style="width:25px; height:20px; background:linear-gradient(#f0f0f0, #ccc); border:1px solid #777; cursor:pointer;">—</button>
                <button style="width:25px; height:20px; background:linear-gradient(#f0f0f0, #ccc); border:1px solid #777; cursor:pointer;">⬜</button>
                <button style="width:25px; height:20px; background:linear-gradient(#e81123, #b30000); border:1px solid #777; color:white; cursor:pointer;">X</button>
            </div>
        </div>

        <div style="flex-grow:1; background:rgba(255,255,255,0.7); padding:20px;">
            <div style="font-weight:bold; margin-bottom:15px;">Connections</div>
            
            <div style="margin-bottom:10px;">
                <span style="display:inline-block; width:12px; height:12px; background:#ffcc00; border-radius:50%; border:1px solid #999; margin-right:5px;"></span>
                AOL (OSCAR) - Online
            </div>
            <div>
                <span style="display:inline-block; width:12px; height:12px; background:#00cc00; border-radius:50%; border:1px solid #999; margin-right:5px;"></span>
                ICQ Network - Available
            </div>
        </div>
    </div>
</body>
</html>
