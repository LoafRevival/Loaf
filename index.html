<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loaf Retro Portal - AIM & ICQ Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <div class="window-title">📁 Loaf Retro Messenger Hub</div>
        <div class="window-controls">
            <button class="win-btn" title="Minimize">—</button>
            <button class="win-btn" title="Maximize">⬜</button>
            <button class="win-btn close" title="Close">X</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-circles">
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="address-box">💻 LoafWebsite &gt; Protocols &gt; OSCAR_Server</div>
    </div>

    <div class="window-body">
        
        <div class="messenger-sidebar">
            <div class="messenger-header">
                <span>Direct Connections</span>
                <span style="font-size: 0.75rem; color:#666;">v1.0</span>
            </div>
            
            <div class="protocol-group">
                <div class="group-title">🟡 AOL (OSCAR) Buddies</div>
                <div class="buddy-item">
                    <span class="status-dot status-online"></span>
                    <span>AimMaster99</span>
                </div>
                <div class="buddy-item">
                    <span class="status-dot status-away"></span>
                    <span>RetroCoder</span>
                </div>
            </div>

            <div class="protocol-group">
                <div class="group-title">🟢 ICQ Network</div>
                <div class="buddy-item">
                    <span class="icq-flower">🌸</span>
                    <span>UIN: 1234567</span>
                </div>
                <div class="buddy-item">
                    <span class="icq-flower">🌹</span>
                    <span>LoafServer_Host</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="loaf-text">loaf here</div>
            <div class="loaf-text">background loafsssss</div>
        </div>

    </div>
</div>

</body>
</html>
