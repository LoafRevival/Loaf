<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loaf Source Code Portal</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <div class="login-box">
            <h2>Loaf Source Code</h2>
            <p class="subtitle">Connect to loaf.oscar.open.server</p>
            <div id="error-msg" class="error-banner d-none"></div>
            <div id="success-msg" class="success-banner d-none"></div>
            <form id="login-form">
                <div class="input-group"><label>Screen Name</label><input type="text" id="login-user" required></div>
                <div class="input-group"><label>Password</label><input type="password" id="login-pass" required></div>
                <button type="submit" class="btn-primary">Sign On</button>
            </form>
            <form id="register-form" class="d-none">
                <div class="input-group"><label>Choose Screen Name</label><input type="text" id="reg-user" required></div>
                <div class="input-group"><label>Create Password</label><input type="password" id="reg-pass" required></div>
                <button type="submit" class="btn-success">Register Account</button>
            </form>
            <div class="auth-footer"><span>New Baker? <a href="#" id="auth-toggle">Create an Account ✨</a></span></div>
        </div>
    </div>

    <div id="dashboard-container" class="dashboard-container d-none">
        <header class="dash-header">
            <h1>Loaf Source Code</h1>
            <div><span id="display-username"></span> <button id="btn-logout" class="btn-disconnect">Disconnect</button></div>
        </header>
        <main class="dash-content">
            <section>
                <h2>Network Controls</h2>
                <div class="action-grid">
                    <button class="btn-action" onclick="alert('Cycled.')">Toggle Node State</button>
                    <button class="btn-action" onclick="alert('Flushed.')">Flush Log Buffer</button>
                </div>
            </section>
            <section>
                <h2>BOS Status</h2>
                <div class="stat-item"><span>Host:</span> <strong>login.loaf.server.chat</strong></div>
                <div class="stat-item"><span>Port:</span> <strong>5190</strong></div>
                <div class="log-output">
                    <p style="color:#60a5fa">[SYS]: Monitoring active retro clients...</p>
                    <p style="color:#34d399">[OK]: Core linked to login.loaf.server.chat ✨</p>
                </div>
            </section>
        </main>
    </div>
    <script src="./script.js"></script>
</body>
</html>
