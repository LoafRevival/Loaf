<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WayBack Machine: LOAF</title>
    <style>
        /* AERO GLASS & BREAD BACKGROUND */
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #f7f3eb url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22 viewBox=%220 0 70 70%22%3E%3Ctext x=%2220%22 y=%2245%22 font-size=%2228%22%3E🍞%3C/text%3E%3C/svg%3E');
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .win { 
            width: 900px; height: 550px; background: rgba(10, 95, 115, 0.45); 
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 8px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { background: rgba(255,255,255,0.2); padding: 5px 15px; color: white; display: flex; justify-content: space-between; }
        .body { display: flex; flex-grow: 1; background: #eef3f7; }
        .sidebar { width: 220px; padding: 20px; border-right: 1px solid #ccc; }
        .content { padding: 40px; flex-grow: 1; }
        .box { background: white; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; }
        .status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>

<div class="win">
    <div class="header"><span>📁 Loaf System Control Panel</span></div>
    
    <div class="body">
        <div class="sidebar">
            <b>Server Status</b>
            <div style="margin-top:15px;"><span class="status-light" style="background:#ffcc00;"></span>AOL OSCAR: Online</div>
            <div style="margin-top:10px;"><span class="status-light" style="background:#00cc00;"></span>ICQ Network: Active</div>
        </div>

        <div class="content">
            <div id="auth-panel" class="box">
                <div id="login-view">
                    <h3>Sign In</h3>
                    <form id="login-form">
                        <input type="text" id="user" placeholder="Screen Name" required>
                        <input type="password" id="pass" placeholder="Password" required>
                        <button type="submit" id="btn-login">Sign In</button>
                    </form>
                </div>
                
                <div id="dashboard-view" style="display:none;">
                    <h3>Buddy List</h3>
                    <p id="welcome-msg"></p>
                    <button onclick="location.reload()">Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</div>
