<div id="auth-panel" class="box">
    <div id="login-view">
        <h3>Sign In</h3>
        <form id="login-form">
            <input type="text" id="user" placeholder="Screen Name" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" id="btn-login">Sign In</button>
            <p style="font-size: 11px; cursor: pointer; color: blue;" onclick="showReg()">Create an account</p>
        </form>
    </div>
    
    <div id="registration-view" style="display:none;">
        <h3>Create Account</h3>
        <form id="reg-form">
            <input type="text" id="reg-user" placeholder="New Screen Name" required>
            <input type="password" id="reg-pass" placeholder="Password" required>
            <button type="submit" id="btn-reg">Register</button>
            <p style="font-size: 11px; cursor: pointer; color: grey;" onclick="showLogin()">Back to Sign In</p>
        </form>
    </div>

    <div id="dashboard-view" style="display:none;">
        <h3>Buddy List</h3>
        <p id="welcome-msg"></p>
        <button onclick="location.reload()">Sign Out</button>
    </div>
</div>
