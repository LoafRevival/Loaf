<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS INJECTED DIRECTLY TO ENSURE IT LOADS */
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #c0c0c0; font-family: 'Segoe UI', sans-serif; }
        
        .window-container {
            width: 950px; height: 600px;
            background: rgba(10, 95, 115, 0.85); /* Solidified color for testing */
            border: 2px solid #fff;
            border-radius: 10px 10px 0 0;
            padding: 5px; display: flex; flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        .title-bar { height: 30px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; color: white; }
        
        .window-body { flex-grow: 1; background: #eef3f7; display: flex; }
        
        .messenger-sidebar { width: 220px; border-right: 1px solid #aaa; padding: 10px; }

        .auth-panel { background: #fff; border: 1px solid #ccc; padding: 20px; margin: 20px; border-radius: 5px; }

        .d-none { display: none !important; }
    </style>
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <div>📁 Loaf: Revive AIM and ICQ!</div>
        <div>— ⬜ X</div>
    </div>
    <div class="window-body">
        <div class="messenger-sidebar">
            <b>Connections</b>
            <div style="font-size: 0.8rem; margin-top: 10px;">
                🟡 AOL (OSCAR)<br>
                🟢 ICQ Network
            </div>
        </div>
        <div class="main-content">
            <div id="auth-container" class="auth-panel">
                <form id="login-form">
                    <h3>Sign In</h3>
                    <input type="text" id="login-user" placeholder="Name">
                    <input type="password" id="login-pass" placeholder="Password">
                    <button type="submit">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Minimal logic to verify JS is running
    document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("Verification: Logic is connected!");
    });
</script>

</body>
</html>
