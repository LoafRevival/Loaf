<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LoafXD: Revive ICQ and AIM!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <div class="window-title">📁 LoafXD</div>
        <div class="window-controls">
            <button class="win-btn">—</button><button class="win-btn">⬜</button><button class="win-btn close">X</button>
        </div>
    </div>

    <div class="window-body">
        <div class="messenger-sidebar">
            <div class="messenger-header">Connections</div>
            <div id="total-users" style="font-size: 0.7rem; padding: 5px;">0 Accounts Configured</div>
        </div>

        <div class="main-content">
            <div id="auth-container">
                <form id="login-form">
                    <div class="panel-title">Sign In</div>
                    <input type="text" id="login-user" placeholder="Screen Name">
                    <input type="password" id="login-pass" placeholder="Password">
                    <button type="submit" class="aero-action-btn">Sign In</button>
                </form>

                <form id="register-form" class="d-none">
                    <div class="panel-title">Create Account</div>
                    <input type="text" id="reg-user" placeholder="Desired handle">
                    <input type="password" id="reg-pass" placeholder="Password">
                    <button type="submit" class="aero-action-btn">Register</button>
                </form>
                
                <div id="error-msg" class="d-none" style="color:red; font-size: 0.8rem;"></div>
                <div id="success-msg" class="d-none" style="color:green; font-size: 0.8rem;"></div>
                <a href="#" id="auth-toggle" style="font-size: 0.8rem;">Create an Account ✨</a>
            </div>

            <div id="dashboard-container" class="d-none">
                <div class="panel-title">User Account: <span id="display-username"></span></div>
                <input type="text" id="user-badge" placeholder="Badge title...">
                <input type="text" id="custom-status" placeholder="Status message...">
                <button id="save-profile" class="aero-action-btn">Save Profile Metadata</button>
                <button id="btn-logout" class="aero-action-btn">Sign Out</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
